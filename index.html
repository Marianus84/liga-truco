<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apertura Truco 2026 - Control de Posiciones</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0a09;
        }
        /* Ocultar barra de scroll pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex justify-center items-start md:py-8 px-2">

    <!-- Contenedor Principal estilo Móvil / App de alta fidelidad -->
    <div class="w-full max-w-md bg-stone-950 rounded-[40px] border-8 border-zinc-800 shadow-2xl overflow-hidden flex flex-col relative my-auto">
        
        <!-- Barra de Estado Simulada (Para inmersión de App) -->
        <div class="bg-black text-xs text-zinc-400 px-6 pt-3 pb-2 flex justify-between items-center font-medium select-none">
            <span id="live-clock">17:44</span>
            <div class="flex items-center gap-1.5">
                <i data-lucide="bluetooth" class="w-3.5 h-3.5 text-zinc-400"></i>
                <span class="text-[10px] font-bold">VoLTE</span>
                <div class="flex items-center gap-0.5">
                    <span class="text-[9px] font-extrabold leading-none">5G</span>
                    <div class="flex gap-0.5 items-end h-2.5">
                        <div class="w-0.5 h-1 bg-zinc-400 rounded-full"></div>
                        <div class="w-0.5 h-1.5 bg-zinc-400 rounded-full"></div>
                        <div class="w-0.5 h-2 bg-zinc-400 rounded-full"></div>
                        <div class="w-0.5 h-2.5 bg-zinc-400 rounded-full"></div>
                    </div>
                </div>
                <!-- Batería -->
                <div class="border border-zinc-500 rounded px-0.5 py-px flex items-center h-3.5 w-6 relative">
                    <div class="bg-emerald-500 h-full w-4/5 rounded-2xs"></div>
                    <span class="absolute inset-0 flex items-center justify-center text-[8px] text-white font-bold">85</span>
                </div>
            </div>
        </div>

        <!-- Selector de Diseño (Comparador) -->
        <div class="bg-zinc-900 border-b border-zinc-800 p-2.5 flex justify-between items-center gap-2">
            <span class="text-xs font-semibold text-zinc-400 tracking-wider">MODO VISUAL:</span>
            <div class="flex bg-zinc-950 p-1 rounded-full border border-zinc-800">
                <button onclick="setDesignMode('original')" id="btn-design-original" class="px-3 py-1 rounded-full text-xs font-medium transition-all text-zinc-400">
                    Original
                </button>
                <button onclick="setDesignMode('opcionC')" id="btn-design-opcionC" class="px-3 py-1 rounded-full text-xs font-bold transition-all bg-emerald-600 text-white shadow-md">
                    Opción C ✨
                </button>
            </div>
        </div>

        <!-- Botones de Acción de Cabecera -->
        <div class="flex justify-between items-center px-4 py-3 bg-zinc-950">
            <button id="btn-toggle-edit" onclick="toggleEditMode()" class="bg-zinc-800 hover:bg-zinc-700 active:scale-95 text-zinc-300 px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider uppercase transition-all border border-zinc-700">
                EDIT OFF
            </button>
            
            <button id="btn-deshacer" onclick="undoAction()" class="bg-yellow-500 hover:bg-yellow-400 active:scale-95 text-zinc-950 px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider uppercase flex items-center gap-1 transition-all shadow-md">
                <i data-lucide="corner-up-left" class="w-3.5 h-3.5 stroke-[3]"></i>
                Deshacer
            </button>
        </div>

        <!-- Contenedor Principal con Scroll -->
        <div class="overflow-y-auto max-h-[75vh] no-scrollbar px-3 pb-24">
            
            <!-- Tabla de Posiciones -->
            <div class="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800/80 shadow-md">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-black text-[10px] font-bold text-zinc-400 uppercase tracking-wider text-center border-b border-zinc-800">
                            <th class="py-2.5 px-2 text-left w-10">Pos</th>
                            <th class="py-2.5 px-2 text-left">Apertura Truco 2026</th>
                            
                            <!-- Cabecera J (Jugados) -->
                            <th id="th-j" class="py-2.5 px-1 w-10 transition-all text-center">J</th>
                            
                            <!-- Cabecera P (Perdidos) -->
                            <th id="th-p" class="py-2.5 px-1 w-10 transition-all text-center">P</th>
                            
                            <!-- Cabecera G (Ganados) -->
                            <th id="th-g" class="py-2.5 px-1 w-11 transition-all text-center">G</th>
                            
                            <!-- Cabecera % (Porcentaje) -->
                            <th id="th-pct" class="py-2.5 px-1 w-12 transition-all text-center">%</th>
                            
                            <th class="py-2.5 px-1 w-8 text-center"><i data-lucide="home" class="w-3.5 h-3.5 mx-auto text-zinc-400"></i></th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Las filas se renderizan dinámicamente con JS -->
                    </tbody>
                </table>
            </div>

            <!-- SECCIONES DE ESTADÍSTICAS -->
            <div class="grid grid-cols-2 gap-3 mt-4">
                
                <!-- MEJORES (%) -->
                <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/50">
                    <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                        <span>Mejores (%)</span>
                        <i data-lucide="trending-up" class="w-3.5 h-3.5 text-emerald-500"></i>
                    </h3>
                    <div id="stats-mejores-pct" class="space-y-1.5 text-xs">
                        <!-- JS Dynamic -->
                    </div>
                </div>

                <!-- MEJORES RACHAS -->
                <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/50">
                    <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                        <span>Mejores Rachas</span>
                        <i data-lucide="flame" class="w-3.5 h-3.5 text-orange-500 animate-pulse"></i>
                    </h3>
                    <div id="stats-mejores-rachas" class="space-y-1.5 text-xs">
                        <!-- JS Dynamic -->
                    </div>
                </div>

                <!-- PEORES (%) -->
                <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/50">
                    <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                        <span>Peores (%)</span>
                        <i data-lucide="trending-down" class="w-3.5 h-3.5 text-rose-500"></i>
                    </h3>
                    <div id="stats-peores-pct" class="space-y-1.5 text-xs">
                        <!-- JS Dynamic -->
                    </div>
                </div>

                <!-- PEORES RACHAS -->
                <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/50">
                    <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                        <span>Peores Rachas</span>
                        <i data-lucide="skull" class="w-3.5 h-3.5 text-zinc-400"></i>
                    </h3>
                    <div id="stats-peores-rachas" class="space-y-1.5 text-xs">
                        <!-- JS Dynamic -->
                    </div>
                </div>

                <!-- PAREJAS MÁS FRECUENTES -->
                <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/50 col-span-2">
                    <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                        <span>Parejas más frecuentes 🦟</span>
                        <i data-lucide="users" class="w-3.5 h-3.5 text-indigo-400"></i>
                    </h3>
                    <div id="stats-parejas-mas" class="grid grid-cols-1 gap-1 text-xs">
                        <!-- JS Dynamic -->
                    </div>
                </div>

                <!-- PAREJAS MENOS FRECUENTES -->
                <div class="bg-zinc-900/60 p-3 rounded-xl border border-zinc-800/50 col-span-2">
                    <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                        <span>Parejas menos frecuentes</span>
                        <i data-lucide="user-minus" class="w-3.5 h-3.5 text-zinc-500"></i>
                    </h3>
                    <div id="stats-parejas-menos" class="grid grid-cols-1 gap-1 text-xs">
                        <!-- JS Dynamic -->
                    </div>
                </div>

            </div>

            <!-- PROBABILIDADES CAMPEÓN -->
            <div class="mt-4 bg-zinc-900/40 p-3 rounded-xl border border-zinc-800/50">
                <h3 class="text-[10px] font-extrabold text-zinc-500 uppercase tracking-widest mb-3 text-center">
                    PROBABILIDADES CAMPEÓN (FALTAN 6 FECHAS)
                </h3>
                <div id="champion-probabilities-grid" class="grid grid-cols-3 gap-2">
                    <!-- JS Dynamic cards -->
                </div>
            </div>

        </div>

        <!-- Botón de Registro de Partida Flotante -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-stone-950 via-stone-950/95 to-transparent flex justify-center">
            <button onclick="openRegisterModal()" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-3.5 px-6 rounded-2xl shadow-lg shadow-violet-950/40 flex items-center justify-center gap-2 active:scale-[0.98] transition-all text-sm tracking-wide uppercase border border-violet-500/30">
                <i data-lucide="swords" class="w-5 h-5"></i>
                Registrar Partida
            </button>
        </div>

    </div>

    <!-- MODAL DE REGISTRO DE PARTIDA -->
    <div id="register-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 hidden backdrop-blur-xs">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-200">
            
            <div class="bg-violet-950/40 px-5 py-4 border-b border-zinc-800 flex justify-between items-center">
                <h3 class="font-bold text-base text-zinc-100 flex items-center gap-2">
                    <i data-lucide="trophy" class="w-5 h-5 text-yellow-500"></i>
                    Nueva Partida
                </h3>
                <button onclick="closeRegisterModal()" class="text-zinc-400 hover:text-zinc-100 p-1 rounded-full hover:bg-zinc-800 transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-5 space-y-4">
                
                <!-- GANADOR -->
                <div>
                    <label class="block text-xs font-bold text-emerald-400 uppercase tracking-wider mb-1.5">Ganador(a)</label>
                    <select id="modal-winner" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-sm text-zinc-100 focus:outline-none focus:border-emerald-500">
                        <!-- JS loaded options -->
                    </select>
                </div>

                <!-- PERDEDOR -->
                <div>
                    <label class="block text-xs font-bold text-rose-400 uppercase tracking-wider mb-1.5">Perdedor(a)</label>
                    <select id="modal-loser" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2.5 text-sm text-zinc-100 focus:outline-none focus:border-rose-500">
                        <!-- JS loaded options -->
                    </select>
                </div>

                <!-- ¿Localía? -->
                <div class="bg-zinc-950 p-3 rounded-xl border border-zinc-800 flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-zinc-300">¿Victoria en Casa?</span>
                        <span class="text-[10px] text-zinc-500">Suma localía al ganador</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="modal-home" class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-zinc-300 after:border-zinc-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-violet-600"></div>
                    </label>
                </div>

            </div>

            <!-- Botones Modal -->
            <div class="bg-zinc-950 px-5 py-4 border-t border-zinc-800/80 flex gap-3">
                <button onclick="closeRegisterModal()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-2.5 rounded-xl text-xs font-bold text-zinc-300 tracking-wider uppercase transition-all">
                    Cancelar
                </button>
                <button onclick="saveMatch()" class="flex-1 bg-violet-600 hover:bg-violet-500 py-2.5 rounded-xl text-xs font-bold text-white tracking-wider uppercase transition-all shadow-md">
                    Guardar
                </button>
            </div>

        </div>
    </div>

    <!-- SCRIPT DE CONTROL E INTERACTIVIDAD -->
    <script>
        // CONFIGURACIÓN DE BASE DE DATOS LOCAL
        let players = [
            { id: 1, name: "Darío", j: 20, p: 7, g: 13, pct: 65, home: 2, streak: ['G','G','G','G','G','P','G','G','P','P','P','G','G','P','P','G','G','G','P','P'] },
            { id: 2, name: "Omar", j: 20, p: 7, g: 13, pct: 65, home: 3, streak: ['P','P','P','P','P','G','G','P','P','P','G','G','G','G','G','G','G','G','G','G'] },
            { id: 3, name: "Ricardo", j: 20, p: 9, g: 11, pct: 55, home: 3, streak: ['G','G','G','G','G','P','G','G','P','P','G','G','P','P','G','G','P','P','G','P'] },
            { id: 4, name: "Mariano", j: 18, p: 8, g: 10, pct: 56, home: 3, streak: ['G','G','G','P','G','G','P','G','P','G','P','G','G','P','P','G','G','G'] },
            { id: 5, name: "Fabricio", j: 12, p: 5, g: 7, pct: 58, home: 0, streak: ['P','P','P','P','G','G','P','G','G','G','G','G'] },
            { id: 6, name: "Tonga", j: 17, p: 10, g: 7, pct: 41, home: 0, streak: ['G','G','P','P','P','P','G','G','P','P','G','G','P','P','P','P','P'] },
            { id: 7, name: "Carlitos", j: 19, p: 13, g: 6, pct: 32, home: 3, streak: ['P','P','P','P','P','P','P','P','P','G','P','P','P','G','G','G','G','P','G'] },
            { id: 8, name: "Altamira", j: 10, p: 5, g: 5, pct: 50, home: 2, streak: ['P','P','P','P','G','P','G','G','G','G'] },
            { id: 9, name: "Pablo", j: 18, p: 13, g: 5, pct: 28, home: 3, streak: ['P','P','P','P','G','P','P','G','P','G','P','G','P','P','P','P','P','P'] },
            { id: 10, name: "Raúl (BA)", j: 4, p: 1, g: 3, pct: 75, home: 0, streak: ['G','P','G','G'] },
            { id: 11, name: "Guillermo (BA)", j: 7, p: 5, g: 2, pct: 29, home: 0, streak: ['P','P','G','P','P','P','G'] }
        ];

        // Base de datos de enfrentamientos para calcular las Parejas más/menos frecuentes de forma dinámica
        let matchupsHistory = [
            { w: "Fabricio", l: "Ricardo", home: false },
            { w: "Ricardo", l: "Tonga", home: false },
            { w: "Carlitos", l: "Ricardo", home: true },
            { w: "Fabricio", l: "Tonga", home: false },
            { w: "Carlitos", l: "Fabricio", home: true },
            { w: "Mariano", l: "Pablo", home: true },
            { w: "Omar", l: "Pablo", home: true },
            { w: "Mariano", l: "Omar", home: true },
            { w: "Darío", l: "Pablo", home: false },
            { w: "Darío", l: "Mariano", home: false }
        ];

        // Historial para Deshacer
        let historyStack = [];

        // Estado de la interfaz
        let currentDesignMode = 'opcionC'; // 'original' o 'opcionC'
        let editModeActive = false;

        // Al iniciar
        window.onload = function() {
            lucide.createIcons();
            updateClock();
            setInterval(updateClock, 60000);
            renderAll();
        };

        function updateClock() {
            const now = new Date();
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${hrs}:${mins}`;
        }

        // CONTROL DE MODOS DE DISEÑO
        function setDesignMode(mode) {
            currentDesignMode = mode;
            
            const btnOriginal = document.getElementById('btn-design-original');
            const btnOpcionC = document.getElementById('btn-design-opcionC');

            if (mode === 'original') {
                btnOriginal.className = "px-3 py-1 rounded-full text-xs font-bold transition-all bg-zinc-700 text-white shadow-md";
                btnOpcionC.className = "px-3 py-1 rounded-full text-xs font-medium transition-all text-zinc-400 hover:text-zinc-200";
            } else {
                btnOriginal.className = "px-3 py-1 rounded-full text-xs font-medium transition-all text-zinc-400 hover:text-zinc-200";
                btnOpcionC.className = "px-3 py-1 rounded-full text-xs font-bold transition-all bg-emerald-600 text-white shadow-md";
            }
            renderLeaderboard();
        }

        function toggleEditMode() {
            editModeActive = !editModeActive;
            const btn = document.getElementById('btn-toggle-edit');
            if (editModeActive) {
                btn.innerText = "EDIT ON";
                btn.className = "bg-amber-600 hover:bg-amber-500 active:scale-95 text-white px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider uppercase transition-all border border-amber-500 shadow-lg animate-pulse";
            } else {
                btn.innerText = "EDIT OFF";
                btn.className = "bg-zinc-800 hover:bg-zinc-700 active:scale-95 text-zinc-300 px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider uppercase transition-all border border-zinc-700";
                // Guardar los cambios hechos en inputs
                saveInputsToData();
            }
            renderLeaderboard();
        }

        function saveInputsToData() {
            players.forEach(p => {
                const nameInp = document.getElementById(`inp-name-${p.id}`);
                const jInp = document.getElementById(`inp-j-${p.id}`);
                const pInp = document.getElementById(`inp-p-${p.id}`);
                const gInp = document.getElementById(`inp-g-${p.id}`);
                const homeInp = document.getElementById(`inp-home-${p.id}`);

                if (nameInp) p.name = nameInp.value;
                if (jInp) p.j = Math.max(0, parseInt(jInp.value) || 0);
                if (pInp) p.p = Math.max(0, parseInt(pInp.value) || 0);
                if (gInp) p.g = Math.max(0, parseInt(gInp.value) || 0);
                if (homeInp) p.home = Math.max(0, parseInt(homeInp.value) || 0);

                // Forzar recalculado de porcentaje y consistencia
                if (p.j !== (p.g + p.p)) {
                    p.j = p.g + p.p;
                }
                p.pct = p.j > 0 ? Math.round((p.g / p.j) * 100) : 0;
            });
            saveStateToHistory();
            renderAll();
        }

        // RESPALDAR ESTADO PARA DESHACER
        function saveStateToHistory() {
            const snapshot = {
                players: JSON.parse(JSON.stringify(players)),
                matchupsHistory: JSON.parse(JSON.stringify(matchupsHistory))
            };
            historyStack.push(snapshot);
            if (historyStack.length > 20) {
                historyStack.shift();
            }
        }

        function undoAction() {
            if (historyStack.length === 0) {
                // Notificación visual de error
                const btn = document.getElementById('btn-deshacer');
                btn.classList.add('bg-rose-600');
                setTimeout(() => btn.classList.remove('bg-rose-600'), 400);
                return;
            }
            const previousState = historyStack.pop();
            players = previousState.players;
            matchupsHistory = previousState.matchupsHistory;
            renderAll();
        }

        // RENDERIZADO GLOBAL
        function renderAll() {
            // Ordenar por Ganados, luego por % de victorias, luego menos partidos
            players.sort((a, b) => {
                if (b.g !== a.g) return b.g - a.g;
                if (b.pct !== a.pct) return b.pct - a.pct;
                return a.j - b.j;
            });

            renderLeaderboard();
            renderStats();
            renderProbabilities();
        }

        // DIBUJAR TABLA DE POSICIONES
        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            // Clases para Opción C vs Original
            const jHeader = document.getElementById('th-j');
            const pHeader = document.getElementById('th-p');
            const gHeader = document.getElementById('th-g');
            const pctHeader = document.getElementById('th-pct');

            if (currentDesignMode === 'opcionC') {
                jHeader.className = "py-2.5 px-1 w-9 text-[10px] font-medium text-zinc-500 text-center transition-all";
                pHeader.className = "py-2.5 px-1 w-9 text-[10px] font-medium text-zinc-500 text-center transition-all";
                gHeader.className = "py-2.5 px-1.5 w-12 text-[11px] font-black text-blue-400 text-center transition-all";
                pctHeader.className = "py-2.5 px-1.5 w-14 text-[11px] font-black text-amber-400 text-center transition-all";
            } else {
                jHeader.className = "py-2.5 px-1 w-10 text-[10px] font-bold text-zinc-400 text-center transition-all";
                pHeader.className = "py-2.5 px-1 w-10 text-[10px] font-bold text-zinc-400 text-center transition-all";
                gHeader.className = "py-2.5 px-1 w-11 text-[10px] font-bold text-zinc-400 text-center transition-all";
                pctHeader.className = "py-2.5 px-1 w-12 text-[10px] font-bold text-zinc-400 text-center transition-all";
            }

            players.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-zinc-800/60 hover:bg-zinc-800/30 transition-all text-xs font-medium text-center align-middle";

                // Icono de medallas
                let rankIcon = `<span class="text-zinc-500 font-bold">${idx + 1}</span>`;
                if (idx === 0) rankIcon = `🏆`;
                else if (idx === 1) rankIcon = `🥈`;
                else if (idx === 2) rankIcon = `🥉`;
                else if (p.pct < 30) rankIcon = `💀`;

                // Colores para el porcentaje %
                let pctBg = "bg-zinc-800 text-zinc-400";
                if (p.pct >= 65) pctBg = "bg-emerald-950/80 text-emerald-400 border border-emerald-800/50";
                else if (p.pct >= 50) pctBg = "bg-amber-950/80 text-amber-400 border border-amber-800/40";
                else if (p.pct < 40) pctBg = "bg-rose-950/80 text-rose-400 border border-rose-800/40";

                // Puntos (G) Color
                const gBg = "bg-blue-950/80 text-blue-200 border border-blue-900/50";

                // Generar los puntitos de racha (últimos 10 resultados para no sobrecargar)
                const visibleStreak = p.streak.slice(-10);
                const streakDots = visibleStreak.map(res => {
                    const color = res === 'G' ? 'bg-emerald-500' : 'bg-rose-500';
                    return `<span class="w-1.5 h-1.5 rounded-full ${color} inline-block mx-0.5"></span>`;
                }).join('');

                // Modos de diseño condicionales
                let colJClass = "text-zinc-200 py-3 text-center";
                let colPClass = "text-rose-500 py-3 text-center";
                let colGClass = "py-3 text-center font-bold";
                let colPctClass = "py-1.5 text-center font-extrabold";

                if (currentDesignMode === 'opcionC') {
                    colJClass = "text-zinc-500 font-light text-[11px] py-3 text-center opacity-75";
                    colPClass = "text-rose-900/80 font-light text-[11px] py-3 text-center opacity-75";
                    colGClass = `py-3 text-center font-black ${gBg} rounded-md scale-95 shadow-sm`;
                    colPctClass = `py-1.5 text-center font-black ${pctBg} rounded-md scale-95 shadow-sm`;
                }

                if (editModeActive) {
                    // Render editable inputs
                    tr.innerHTML = `
                        <td class="py-2 px-1 text-center font-bold text-zinc-500">${rankIcon}</td>
                        <td class="py-2 px-2 text-left">
                            <input type="text" id="inp-name-${p.id}" value="${p.name}" class="bg-zinc-950 border border-zinc-700 rounded px-1.5 py-1 text-xs text-white w-full font-bold">
                        </td>
                        <td class="py-2 px-1"><input type="number" id="inp-j-${p.id}" value="${p.j}" class="bg-zinc-950 border border-zinc-700 rounded w-8 text-center py-1 text-xs text-zinc-300"></td>
                        <td class="py-2 px-1"><input type="number" id="inp-p-${p.id}" value="${p.p}" class="bg-zinc-950 border border-zinc-700 rounded w-8 text-center py-1 text-xs text-rose-500"></td>
                        <td class="py-2 px-1"><input type="number" id="inp-g-${p.id}" value="${p.g}" class="bg-zinc-950 border border-zinc-700 rounded w-8 text-center py-1 text-xs text-blue-400 font-bold"></td>
                        <td class="py-2 px-1 text-zinc-400 text-[11px]">${p.pct}%</td>
                        <td class="py-2 px-1"><input type="number" id="inp-home-${p.id}" value="${p.home}" class="bg-zinc-950 border border-zinc-700 rounded w-8 text-center py-1 text-xs text-zinc-400"></td>
                    `;
                } else {
                    // Render vista normal de fila
                    tr.innerHTML = `
                        <td class="py-3 px-2 text-center text-sm">${rankIcon}</td>
                        <td class="py-3 px-2 text-left font-bold text-zinc-100">
                            <div class="flex flex-col">
                                <span>${p.name}</span>
                                <div class="flex items-center mt-1 overflow-x-hidden w-24 no-scrollbar">
                                    ${streakDots}
                                </div>
                            </div>
                        </td>
                        <td class="${colJClass}">${p.j}</td>
                        <td class="${colPClass}">${p.p}</td>
                        <td class="${colGClass}">${p.g}</td>
                        <td class="px-1"><div class="${colPctClass}">${p.pct}%</div></td>
                        <td class="py-3 px-1 text-zinc-400">${p.home}</td>
                    `;
                }

                tbody.appendChild(tr);
            });
        }

        // CÁLCULO Y RENDER DE ESTADÍSTICAS SECUNDARIAS
        function renderStats() {
            // 1. Mejores y peores (%)
            const pctSorted = [...players].sort((a,b) => b.pct - a.pct);
            
            const divMejoresPct = document.getElementById('stats-mejores-pct');
            divMejoresPct.innerHTML = pctSorted.slice(0, 3).map(p => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-1 rounded">
                    <span class="font-medium text-zinc-300 truncate max-w-[80px]">${p.name}</span>
                    <span class="font-bold text-emerald-400">${p.pct}%</span>
                </div>
            `).join('');

            const divPeoresPct = document.getElementById('stats-peores-pct');
            divPeoresPct.innerHTML = pctSorted.slice(-3).reverse().map(p => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-1 rounded">
                    <span class="font-medium text-zinc-400 truncate max-w-[80px]">${p.name}</span>
                    <span class="font-bold text-rose-500">${p.pct}%</span>
                </div>
            `).join('');

            // 2. Rachas Actuales
            // Calcular racha actual mirando el final de la lista de streaks de cada uno
            let streakData = players.map(p => {
                let currentType = p.streak[p.streak.length - 1];
                let count = 0;
                if (currentType) {
                    for (let i = p.streak.length - 1; i >= 0; i--) {
                        if (p.streak[i] === currentType) {
                            count++;
                        } else {
                            break;
                        }
                    }
                }
                return { name: p.name, type: currentType, count: count };
            });

            // Mejores rachas (Ganadoras)
            const winStreaks = streakData.filter(s => s.type === 'G').sort((a,b) => b.count - a.count);
            const divMejoresRachas = document.getElementById('stats-mejores-rachas');
            divMejoresRachas.innerHTML = winStreaks.slice(0, 3).map(s => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-1 rounded">
                    <span class="font-medium text-zinc-300 truncate max-w-[80px]">${s.name}</span>
                    <span class="font-bold text-orange-400 flex items-center gap-0.5">🔥 ${s.count}</span>
                </div>
            `).join('') || '<div class="text-zinc-500 text-[10px] text-center italic py-2">Sin rachas activas</div>';

            // Peores rachas (Perdedoras)
            const loseStreaks = streakData.filter(s => s.type === 'P').sort((a,b) => b.count - a.count);
            const divPeoresRachas = document.getElementById('stats-peores-rachas');
            divPeoresRachas.innerHTML = loseStreaks.slice(0, 3).map(s => `
                <div class="flex justify-between items-center bg-zinc-900/30 p-1 rounded">
                    <span class="font-medium text-zinc-400 truncate max-w-[80px]">${s.name}</span>
                    <span class="font-bold text-zinc-400 flex items-center gap-0.5">💀 ${s.count}</span>
                </div>
            `).join('') || '<div class="text-zinc-500 text-[10px] text-center italic py-2">Sin derrotas recientes</div>';

            // 3. Frecuencia de Enfrentamientos
            let pairs = {};
            matchupsHistory.forEach(m => {
                let key = [m.w, m.l].sort().join(' | ');
                pairs[key] = (pairs[key] || 0) + 1;
            });

            let sortedPairs = Object.keys(pairs).map(key => ({ pair: key, count: pairs[key] })).sort((a,b) => b.count - a.count);

            const divParejasMas = document.getElementById('stats-parejas-mas');
            divParejasMas.innerHTML = sortedPairs.slice(0, 5).map(item => `
                <div class="flex justify-between items-center bg-zinc-950/40 px-2 py-1 rounded border border-zinc-800/40 text-[11px]">
                    <span class="text-zinc-300 truncate max-w-[170px]">${item.pair}</span>
                    <span class="font-bold text-indigo-400">${item.count}</span>
                </div>
            `).join('') || '<div class="text-zinc-500 text-center italic text-[11px] py-1">Registra partidas para ver estadísticas</div>';

            const divParejasMenos = document.getElementById('stats-parejas-menos');
            divParejasMenos.innerHTML = sortedPairs.slice(-5).reverse().map(item => `
                <div class="flex justify-between items-center bg-zinc-950/40 px-2 py-1 rounded border border-zinc-800/40 text-[11px]">
                    <span class="text-zinc-400 truncate max-w-[170px]">${item.pair}</span>
                    <span class="font-bold text-zinc-500">${item.count}</span>
                </div>
            `).join('') || '<div class="text-zinc-500 text-center italic text-[11px] py-1">Registra partidas para ver estadísticas</div>';
        }

        // CÁLCULO DE PROBABILIDADES DE SER CAMPEÓN
        function renderProbabilities() {
            // Calcular un algoritmo de peso: Puntos (G) combinados con efectividad (%) y partidos restantes
            // Para fines de aproximar los valores reales del screenshot:
            // Darío: ~30%, Omar: ~30%, Ricardo: ~18%, Mariano: ~14%, Tonga: ~5%, Fabricio: ~5%
            let totalWeight = 0;
            let weights = players.map(p => {
                // Si ha jugado menos de 5 partidos, su factor de campeonato disminuye por falta de ritmo
                let activityFactor = p.j >= 10 ? 1.0 : (p.j / 10);
                let w = (p.g * 1.5) * (p.pct / 100) * activityFactor;
                // Exponencial para los líderes que los despega del pelotón
                w = Math.pow(w, 2);
                return { id: p.id, name: p.name, weight: w };
            });

            totalWeight = weights.reduce((sum, item) => sum + item.weight, 0);

            const grid = document.getElementById('champion-probabilities-grid');
            grid.innerHTML = '';

            weights.forEach(item => {
                let prob = totalWeight > 0 ? Math.round((item.weight / totalWeight) * 100) : 0;
                
                // Forzar que si da números extremadamente pequeños se quede en 0%
                if (prob < 3) prob = 0;

                const card = document.createElement('div');
                card.className = `p-2 rounded-xl border text-center transition-all ${
                    prob > 20 
                    ? 'bg-amber-950/20 border-amber-500/30 shadow-md shadow-amber-950/10' 
                    : prob > 0 
                      ? 'bg-zinc-900 border-zinc-800' 
                      : 'bg-zinc-950/50 border-zinc-900 opacity-40'
                }`;

                card.innerHTML = `
                    <div class="text-[10px] font-bold truncate text-zinc-300">${item.name}</div>
                    <div class="text-sm font-black mt-1 ${
                        prob > 20 ? 'text-amber-400' : prob > 0 ? 'text-zinc-100' : 'text-zinc-600'
                    }">${prob}%</div>
                `;

                grid.appendChild(card);
            });
        }

        // MODAL DE REGISTRO
        function openRegisterModal() {
            const winnerSelect = document.getElementById('modal-winner');
            const loserSelect = document.getElementById('modal-loser');

            // Cargar opciones ordenadas alfabéticamente
            const sortedPlayers = [...players].sort((a,b) => a.name.localeCompare(b.name));
            
            winnerSelect.innerHTML = sortedPlayers.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            loserSelect.innerHTML = sortedPlayers.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

            // Seleccionar por defecto distintos
            if (winnerSelect.options.length > 1) {
                loserSelect.selectedIndex = 1;
            }

            document.getElementById('register-modal').classList.remove('hidden');
        }

        function closeRegisterModal() {
            document.getElementById('register-modal').classList.add('hidden');
        }

        function saveMatch() {
            const wId = parseInt(document.getElementById('modal-winner').value);
            const lId = parseInt(document.getElementById('modal-loser').value);
            const isHome = document.getElementById('modal-home').checked;

            if (wId === lId) {
                alert("¡El ganador y el perdedor no pueden ser la misma persona!");
                return;
            }

            // Respaldar antes de modificar
            saveStateToHistory();

            const winner = players.find(p => p.id === wId);
            const loser = players.find(p => p.id === lId);

            // Actualizar datos de Ganador
            winner.g += 1;
            winner.j += 1;
            winner.streak.push('G');
            if (isHome) {
                winner.home += 1;
            }
            winner.pct = Math.round((winner.g / winner.j) * 100);

            // Actualizar datos de Perdedor
            loser.p += 1;
            loser.j += 1;
            loser.streak.push('P');
            loser.pct = Math.round((loser.g / loser.j) * 100);

            // Guardar registro de enfrentamiento para parejas frecuentes
            matchupsHistory.push({
                w: winner.name,
                l: loser.name,
                home: isHome
            });

            closeRegisterModal();
            renderAll();
        }
    </script>
